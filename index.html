<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>MBA Eng. de Software com IA — FullCycle</title>
  <meta name="description" content="Resumos e exemplos do MBA em Engenharia de Software com IA da FullCycle" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #42b883;
    }
    .sidebar-nav > ul > li > strong {
      display: block;
      margin: 18px 0 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6b7280;
    }
    .mermaid {
      text-align: center;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div id="app">Carregando…</div>
  <script>
    window.$docsify = {
      name: 'MBA Eng. Software com IA',
      repo: 'Lucassamuel97/mba-eng-software-ia-fullcycle',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      maxLevel: 4,
      search: {
        placeholder: 'Buscar nos resumos…',
        noData: 'Nenhum resultado encontrado.',
        depth: 4,
        hideOtherSidebarContent: false,
      },
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          },
        },
      },
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (window.mermaid) {
              window.mermaid.run({ querySelector: '.mermaid' });
            }
          });
        },
      ],
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
